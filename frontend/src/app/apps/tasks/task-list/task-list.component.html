<div class="task-list-container">
  <div class="list-header">
    <div class="search-wrapper">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        placeholder="Suche nach Name oder Beschreibung..."
        class="search-input"
      />
    </div>
    <button (click)="openCreateTask()" class="btn-add">
      + Task hinzufügen
    </button>
  </div>
  <hr class="separator" />
  @if (filteredTasks.length > 0) {
    @for (task of filteredTasks; track task.id) {
      <div class="task-card">
        <h3 class="task-title">{{ task.title }}</h3>
        <div class="task-info-grid">
          <div class="info-label">Beschreibung</div>
          <div class="info-value desc-value">{{ task.description }}</div>
          <div class="info-label">Status</div>
          <div class="info-value">
            <span class="status-badge" [style.background]="getStatusColor(task.status)">
              {{ task.status }}
            </span>
          </div>
          <div class="info-label">Deadline</div>
          <div class="info-value">{{ task.deadline }}</div>
          <div class="info-label">Zugewiesen an</div>
          <div class="info-value">{{ task.assignedUserName ?? 'Nicht zugewiesen' }}</div>
        </div>
        <div class="card-actions">
          <button (click)="openEditTask(task)" class="btn-edit">Bearbeiten</button>
          <button (click)="deleteTask(task.id)" class="btn-delete">Löschen</button>
        </div>
      </div>
    }
  } @else {
    <p style="text-align: center; color: #888; margin-top: 20px;">Keine Tasks gefunden.</p>
  }
</div>
