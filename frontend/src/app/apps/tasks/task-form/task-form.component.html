<div class="form-container">
  <div class="task-form">
    <h2>{{ isEditMode ? 'Task bearbeiten' : 'Task erstellen' }}</h2>

    <div class="form-group">
      <label>Titel <span style="color: red;">*</span></label>
      <input type="text" [(ngModel)]="task.title" name="title" />
    </div>

    <div class="form-group">
      <label>Beschreibung <span style="color: red;">*</span></label>
      <textarea [(ngModel)]="task.description" name="description" rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>Deadline <span style="color: red;">*</span></label>
      <input type="date" [(ngModel)]="task.deadline" name="deadline" [min]="today" />
    </div>

    <div class="form-group">
      <label>Zugewiesener Benutzer</label>
      <select [(ngModel)]="task.assignedUserId" name="assignedUserId">
        <option [ngValue]="null">Keiner</option>
        @for (user of users; track user.id) {
          <option [ngValue]="user.id">{{ user.name }}</option>
        }
      </select>
    </div>

    @if (!isEditMode && !projectId) {
      <div class="form-group">
        <label>Projekt <span style="color: red;">*</span></label>
        <select [(ngModel)]="task.projectId" name="projectId">
          <option [ngValue]="null" disabled>Projekt auswählen...</option>
          @for (project of projects; track project.id) {
            <option [ngValue]="project.id">{{ project.title }}</option>
          }
        </select>
      </div>
    }

    @if (isEditMode) {
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="task.statusId" name="status">
          @for (status of statuses; track status.id) {
            <option [ngValue]="status.id">{{ status.name }}</option>
          }
        </select>
      </div>
    }

    <div class="form-actions">
      <button (click)="cancel()" class="btn-cancel">Abbrechen</button>
      <button (click)="saveTask()" class="btn-save">{{ isEditMode ? 'Speichern' : 'Erstellen' }}</button>
    </div>
  </div>
</div>
