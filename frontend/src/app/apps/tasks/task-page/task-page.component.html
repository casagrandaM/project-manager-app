<div style="width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center;">

  @if (!showForm) {
    <div class="top-header">
      <h1 style="text-align: center; color: #333; font-size: 2rem; margin-bottom: 25px; font-weight: bold;">Projekt Tasks</h1>

      <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button (click)="toggleView('list')" [style.background-color]="showList ? '#007bff' : '#e9ecef'" [style.color]="showList ? 'white' : '#495057'" [style.box-shadow]="showList ? '0 4px 8px rgba(0, 123, 255, 0.4)' : 'none'" style="border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: 600; min-width: 160px; transition: all 0.2s;">Listenansicht</button>
        <button (click)="toggleView('kanban')" [style.background-color]="showKanban ? '#007bff' : '#e9ecef'" [style.color]="showKanban ? 'white' : '#495057'" [style.box-shadow]="showKanban ? '0 4px 8px rgba(0, 123, 255, 0.4)' : 'none'" style="border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: 600; min-width: 160px; transition: all 0.2s;">Kanban Board</button>
      </div>
    </div>
    <hr style="border: 0; border-top: 2px solid #eee; margin: 0 auto 30px auto; width: 90%;" />
  }

  <div style="text-align: left;">
    @if (showList) {
      <app-task-list
        [refreshTrigger]="refreshCounter"
        [searchTerm]="searchTerm"
        [projectId]="projectId"
        (create)="openForm()"
        (edit)="openEditForm($event)"
        (requestDelete)="requestDelete($event)">
      </app-task-list>
    }

    @if (showKanban) {
      <app-kanban-board
        [refreshTrigger]="refreshCounter"
        [projectId]="projectId"
        (edit)="openEditForm($event)">
      </app-kanban-board>
    }

    @if (showForm) {
      <app-task-form
        [taskToEdit]="taskToEdit"
        [projectId]="projectId"
        (close)="closeForm($event)"
        (showMessage)="handleFormMessage($event)">
      </app-task-form>
    }
  </div>

  <!-- POPUP DIALOG -->
  @if (showDialog) {
    <div class="dialog-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999;">
      <div class="dialog-box" style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.25); min-width: 280px; max-width: 400px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;">

        @if (!isConfirmDialog) {
          @if (isSuccessDialog) {
            <!-- Grüner Haken für Success -->
            <div style="width: 50px; height: 50px; background: #d4edda; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 30px; height: 30px;">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
          } @else {
            <!-- Rotes X für Error (falls doch mal ohne Buttons) -->
            <div style="width: 50px; height: 50px; background: #f8d7da; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 30px; height: 30px;">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </div>
          }
        }

        <p style="font-size: 16px; margin: 0; color: #333;">{{ dialogMessage }}</p>

        @if (isConfirmDialog) {
          <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
            <button (click)="closeDialog(true)" style="padding: 8px 20px; border-radius: 6px; border: none; background-color: #007bff; cursor: pointer; font-weight: bold; color: white;">OK</button>
            <button (click)="closeDialog(false)" style="padding: 8px 20px; border-radius: 6px; border: none; background-color: #d1d5db; cursor: pointer; font-weight: bold; color: #111;">Abbrechen</button>
          </div>
        }
      </div>
    </div>
  }

</div>
