<div class="form-wrapper">
  <div class="form-card">

    <div class="form-header">
      <div class="form-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          @if (isEditMode) {
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          } @else {
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            <line x1="12" y1="11" x2="12" y2="17"></line>
            <line x1="9" y1="14" x2="15" y2="14"></line>
          }
        </svg>
      </div>
      <div>
        <h2 class="form-title">{{ isEditMode ? 'Projekt bearbeiten' : 'Neues Projekt' }}</h2>
        <p class="form-subtitle">{{ isEditMode ? 'Änderungen werden gespeichert.' : 'Füllen Sie die Details aus.' }}</p>
      </div>
    </div>

    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Titel <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.title" name="title" class="form-input" placeholder="z.B. Website Relaunch" />
      </div>

      <div class="form-group">
        <label class="form-label">Beschreibung</label>
        <textarea [(ngModel)]="form.description" name="description" rows="4" class="form-input" placeholder="Optionale Beschreibung des Projekts …"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="cancel()">Abbrechen</button>
      <button class="btn-save" (click)="save()">
        {{ isEditMode ? 'Speichern' : 'Projekt erstellen' }}
      </button>
    </div>

  </div>
</div>
