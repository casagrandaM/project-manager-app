<div class="form-wrapper">
  <div class="form-card">

    <h2 class="form-title">{{ isEditMode ? 'Projekt bearbeiten' : 'Neues Projekt erstellen' }}</h2>

    <div class="form-group">
      <label class="form-label">Titel <span class="required">*</span></label>
      <input type="text" [(ngModel)]="form.title" name="title" class="form-input" placeholder="Projekttitel eingeben" />
    </div>

    <div class="form-group">
      <label class="form-label">Beschreibung</label>
      <textarea [(ngModel)]="form.description" name="description" rows="4" class="form-input" placeholder="Optionale Beschreibung"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="cancel()">Abbrechen</button>
      <button class="btn-save" (click)="save()">{{ isEditMode ? 'Speichern' : 'Erstellen' }}</button>
    </div>

  </div>
</div>
