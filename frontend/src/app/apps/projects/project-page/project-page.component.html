<div class="page-wrapper">

  <div class="deco deco-left">
    <div class="deco-blob deco-blob-1"></div>
    <div class="deco-blob deco-blob-2"></div>
    <div class="deco-dots"></div>
  </div>
  <div class="deco deco-right">
    <div class="deco-blob deco-blob-3"></div>
    <div class="deco-blob deco-blob-4"></div>
    <div class="deco-dots"></div>
  </div>

  @if (!showForm) {
    <app-project-list
      [refreshTrigger]="refreshCounter"
      (create)="openForm()"
      (edit)="openEditForm($event)"
      (requestDelete)="requestDelete($event)"
      (select)="selectProject($event)">
    </app-project-list>
  }

  @if (showForm) {
    <app-project-form
      [projectToEdit]="projectToEdit"
      (close)="closeForm($event)"
      (showMessage)="handleFormMessage($event)">
    </app-project-form>
  }

  <!-- ── Dialog ── -->
  @if (showDialog) {
    <div class="dialog-backdrop">
      <div class="dialog-box">
        @if (!isConfirmDialog && isSuccessDialog) {
          <div class="dialog-success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        }
        @if (isConfirmDialog) {
          <div class="dialog-warn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </div>
        }
        <p class="dialog-message">{{ dialogMessage }}</p>
        @if (isConfirmDialog) {
          <div class="dialog-actions">
            <button class="dialog-btn-cancel" (click)="closeDialog(false)">Abbrechen</button>
            <button class="dialog-btn-ok" (click)="closeDialog(true)">Bestätigen</button>
          </div>
        }
      </div>
    </div>
  }

</div>
